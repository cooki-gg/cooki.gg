<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root{

  #spiderCanvas{
    position: absolute;

<script>
(function(){
  const toast = document.getElementById('toast');
  let toastTimer;
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const value = btn.dataset.value;
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(value).then(() => showToast('Copied "' + value + '"'));
      } else {
        showToast(value);
      }
    });
  });

  const spiderCanvas = document.getElementById('spiderCanvas');
  const sctx = spiderCanvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const RES_W = 140;
  let RES_H = 90;

  const webBuffer = document.createElement('canvas');
  const wctx = webBuffer.getContext('2d');

  function plotPixelLine(ctx, x0, y0, x1, y1){
    x0 = Math.round(x0); y0 = Math.round(y0);
    x1 = Math.round(x1); y1 = Math.round(y1);
    let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
    let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
    let err = dx - dy;
    while(true){
      ctx.fillRect(x0, y0, 1, 1);
      if(x0 === x1 && y0 === y1) break;
      const e2 = 2 * err;
      if(e2 > -dy){ err -= dy; x0 += sx; }
      if(e2 < dx){ err += dx; y0 += sy; }
    }
  }

  function drawWeb(){
    const hubX = RES_W * 0.85, hubY = RES_H * 0.14;
    const R = Math.sqrt(RES_W*RES_W + RES_H*RES_H) * 0.85;
    const N_SPOKES = 18;
    const angles = [];
    for(let i=0;i<N_SPOKES;i++) angles.push(2*Math.PI*i/N_SPOKES);

    wctx.clearRect(0, 0, RES_W, RES_H);

    const grad = wctx.createRadialGradient(hubX, hubY, 0, hubX, hubY, R*0.6);
    grad.addColorStop(0, 'rgba(255,255,255,0.16)');
    grad.addColorStop(0.55, 'rgba(255,255,255,0.04)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    wctx.fillStyle = grad;
    wctx.fillRect(0, 0, RES_W, RES_H);

    wctx.fillStyle = 'rgba(255,255,255,0.4)';
    plotPixelLine(wctx, hubX, hubY, hubX, 0);
    plotPixelLine(wctx, hubX, hubY, RES_W, hubY);
    plotPixelLine(wctx, hubX, hubY, RES_W, 0);

    wctx.fillStyle = 'rgba(255,255,255,0.6)';
    angles.forEach(a => {
      plotPixelLine(wctx, hubX, hubY, hubX + R*Math.cos(a), hubY + R*Math.sin(a));
    });

    const ringFracs = [0.1, 0.2, 0.32, 0.45, 0.58, 0.71, 0.84, 0.96];
    wctx.fillStyle = 'rgba(255,255,255,0.42)';
    ringFracs.forEach(rf => {
      const r = rf * R;
      let prev = null;
      const loopAngles = angles.concat([angles[0]]);
      loopAngles.forEach(a => {
        const x = hubX + r*Math.cos(a), y = hubY + r*Math.sin(a);
        if(prev) plotPixelLine(wctx, prev[0], prev[1], x, y);
        prev = [x, y];
      });
    });

    wctx.fillStyle = 'rgba(255,255,255,0.55)';
    wctx.fillRect(Math.round(hubX)-1, Math.round(hubY)-1, 2, 2);
  }

  function resizeSpiderCanvas(){
    const vw = window.innerWidth, vh = window.innerHeight;
    RES_H = Math.round(RES_W * (vh / vw));
    spiderCanvas.width = RES_W;
    spiderCanvas.height = RES_H;
    webBuffer.width = RES_W;
    webBuffer.height = RES_H;
    drawWeb();
    if(reduceMotion){
      sctx.clearRect(0, 0, RES_W, RES_H);
      sctx.drawImage(webBuffer, 0, 0);
    }
  }
  window.addEventListener('resize', resizeSpiderCanvas);
  resizeSpiderCanvas();

  const BODY = [
    ".......................",
    ".......................",
    ".......................",
    "...B...B.......B...B...",
    "...B...B.BBBBB.B...B...",
    "..B...B.BRRRRRB.B...B..",
    "..B..B..BBRRRBB..B..B..",
    ".B...B..BBBRBBB..B...B.",
    "..B...B.BBRRRBB.B...B..",
    "...BB..BBRRRRRBB..BB...",
    ".....B..BBBBBBB..B.....",
    "......BBBBBBBBBBB......",
    ".......B.BBBBB.B.......",
    "......B.BBBBBBB.B......",
    "....BB.BBBBBBBBB.BB....",
    "...B...B.BBBBB.B...B...",
    "..B...B..BBBBB..B...B..",
    "..B...B...B.B...B...B..",
    "..B..B...........B..B..",
    "..B..B...........B..B..",
    "..B...B.........B...B..",
    "..B....B.......B....B..",
    ".......................",
    "......................."
  ];
  const BODY_COLORS = { 'B': '#0a0a0a', 'R': '#bf360c' };
  const CELL = 2.5;
  const GRID_W = BODY[0].length;
  const GRID_H = BODY.length;

  // each of the 8 legs, as its own connected pixel group with a per-pixel
  // weight (0 at the body attachment, 1 at the outermost tip)
  const LEGS = [
    {"cells":[[3,3,1],[4,3,0.833],[5,2,0.687],[6,2,0.527],[7,1,0.471],[8,2,0.236],[9,3,0.0],[9,4,0.167]]},
    {"cells":[[3,7,1],[4,7,0.838],[5,8,0.658],[6,8,0.493],[7,8,0.329],[8,8,0.164],[9,8,0.0],[9,7,0.164],[8,6,0.368],[7,5,0.593],[6,5,0.697],[5,6,0.735]]},
    {"cells":[[3,15,1],[4,15,0.833],[5,16,0.687],[6,17,0.601],[7,17,0.471],[8,16,0.236],[9,15,0.0],[9,14,0.167],[8,14,0.236],[7,14,0.373],[6,14,0.527],[5,14,0.687]]},
    {"cells":[[3,19,1],[4,19,0.833],[5,20,0.687],[6,20,0.527],[7,21,0.471],[8,20,0.236],[9,19,0.0],[9,18,0.167]]},
    {"cells":[[14,4,0.0],[15,3,0.194],[16,2,0.389],[17,2,0.495],[18,2,0.614],[19,2,0.74],[20,2,0.869],[21,2,1],[14,5,0.137]]},
    {"cells":[[14,7,0.0],[15,7,0.124],[16,6,0.277],[17,6,0.392],[18,5,0.555],[19,5,0.668],[20,6,0.754],[21,7,0.868],[22,8,1],[14,8,0.124]]},
    {"cells":[[14,14,0.0],[15,15,0.177],[16,16,0.354],[17,16,0.451],[18,17,0.625],[19,17,0.729],[20,16,0.791],[21,15,0.884],[22,14,1],[14,15,0.125]]},
    {"cells":[[14,17,0.0],[14,18,0.131],[15,19,0.294],[16,20,0.473],[17,20,0.557],[18,20,0.657],[19,20,0.766],[20,20,0.881],[21,20,1]]}
  ];

  // each leg gets its own distinct timing offset around the step cycle —
  // a full 8-point stagger (a rippling wave gait) instead of 2 rigid
  // groups, so no two legs — front or back — ever move in lockstep
  const PHASE_OFFSET = [0, 0.25, 0.5, 0.75, 0.125, 0.375, 0.625, 0.875];

  // derive each leg's own attach->tip direction so it swings along its
  // natural angle instead of a generic horizontal shift
  LEGS.forEach(leg => {
    let attach = leg.cells[0], tip = leg.cells[0];
    leg.cells.forEach(cell => {
      if(cell[2] < attach[2]) attach = cell;
      if(cell[2] > tip[2]) tip = cell;
    });
    const dr = tip[0]-attach[0], dc = tip[1]-attach[1];
    const len = Math.hypot(dr, dc) || 1;
    leg.dirR = dr/len;
    leg.dirC = dc/len;
  });

  const LEG_PIXELS = new Set();
  LEGS.forEach(leg => leg.cells.forEach(([r,c]) => LEG_PIXELS.add(r+','+c)));

  const MAX_REACH = 3;        // grid units of stride half-length
  const STANCE_DIST = 2 * MAX_REACH * CELL; // canvas-px of body travel per planted drag —
                                             // sized so the ramp exactly cancels body motion
  const SWING_DIST = STANCE_DIST * 0.4;     // quick snap-forward, shorter than the drag
  const TOTAL_DIST = STANCE_DIST + SWING_DIST;
  const LIFT_MAX = 1.1;        // small perpendicular arc while a leg is mid-swing

  LEGS.forEach(leg => {
    // front legs (dirR<0) must ramp the opposite way from back legs (dirR>0)
    // to cancel the same forward body motion — see derivation in comments below
    leg.rampSign = leg.dirR < 0 ? 1 : -1;
    leg.perpR = -leg.dirC;
    leg.perpC = leg.dirR;
  });

  function legOffset(leg, phaseOffset, distanceTraveled){
    const offsetDist = phaseOffset * TOTAL_DIST;
    const local = ((distanceTraveled + offsetDist) % TOTAL_DIST + TOTAL_DIST) % TOTAL_DIST;
    let reach, lift = 0;
    if(local < STANCE_DIST){
      // planted: local offset ramps linearly so it exactly cancels the
      // body's own forward travel — the tip stays put on screen
      reach = leg.rampSign * (-MAX_REACH + (local / STANCE_DIST) * 2 * MAX_REACH);
    } else {
      // swing: quick snap back to the starting plant position, with a
      // small lift arc so it visibly leaves the ground mid-reposition
      const s = (local - STANCE_DIST) / SWING_DIST;
      reach = leg.rampSign * (MAX_REACH - s * 2 * MAX_REACH);
      lift = Math.sin(s * Math.PI) * LIFT_MAX;
    }
    return { reach, lift };
  }

  function drawSpider(centerX, centerY, angle, distanceTraveled){
    sctx.save();
    sctx.translate(centerX, centerY);
    sctx.rotate(angle);

    // static body/head — everything that isn't part of an animated leg
    for(let r=0;r<GRID_H;r++){
      const row = BODY[r];
      for(let c=0;c<row.length;c++){
        const ch = row[c];
        if(ch === '.' || LEG_PIXELS.has(r+','+c)) continue;
        sctx.fillStyle = BODY_COLORS[ch];
        sctx.fillRect(
          Math.round((c - GRID_W/2) * CELL),
          Math.round((r - GRID_H/2) * CELL),
          Math.ceil(CELL), Math.ceil(CELL)
        );
      }
    }

    // each leg: planted (screen-fixed tip) while its group is in stance,
    // then a quick lifted snap forward to plant again — real walking
    // kinematics rather than a sine sway
    sctx.fillStyle = BODY_COLORS['B'];
    LEGS.forEach((leg, i) => {
      const { reach, lift } = legOffset(leg, PHASE_OFFSET[i], distanceTraveled);
      leg.cells.forEach(([r,c,w]) => {
        const drawRow = r + leg.dirR*reach*w + leg.perpR*lift*w;
        const drawCol = c + leg.dirC*reach*w + leg.perpC*lift*w;
        sctx.fillRect(
          Math.round((drawCol - GRID_W/2) * CELL),
          Math.round((drawRow - GRID_H/2) * CELL),
          Math.ceil(CELL), Math.ceil(CELL)
        );
      });
    });

    sctx.restore();
  }

  const SPIDER_W = GRID_W * CELL;
  const SPIDER_H = GRID_H * CELL;

  let active = false;
  let startTime = 0;
  let duration = 9000;
  let fromX = 0, toX = 0, y = 0, movingRight = true;
  let rafId = null;

  function frame(now){
    sctx.clearRect(0, 0, RES_W, RES_H);
    sctx.drawImage(webBuffer, 0, 0);
    if(active){
      const elapsed = now - startTime;
      const p = Math.min(1, elapsed / duration);
      const x = fromX + (toX - fromX) * p;
      const distanceTraveled = Math.abs(x - fromX);
      const facing = movingRight ? -Math.PI/2 : Math.PI/2; // rotate front to face travel direction
      drawSpider(x, y, facing, distanceTraveled);
      if(p >= 1){
        active = false;
        scheduleNext();
      }
    }
    rafId = requestAnimationFrame(frame);
  }
